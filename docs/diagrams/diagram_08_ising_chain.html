<!DOCTYPE html>
<!--
DATA TRACE (diagram_08_ising_chain.html) — single idea: Pearson implies one tight cluster;
conditioning under the Ising model breaks it into a hub-and-spoke structure on 11883, with
several pairwise relationships flipping sign. Source: diagram_jsons/diagram_08_ising_chain.json

Static (always visible):
  nodes 13305,11883(hub),8567,15551,11182(peripheral),5932(peripheral) -> nodes[*].id/.role
  11883 placed at visual center                                       -> top-level "hub": "11883"
  edge stroke-width = |ising_J| * 10                                  -> edges[*].ising_J
  flipped edges drawn accent + dashed, incl. 13305<->8567 (J=-0.139)   -> edges[*].flipped === true
  cohesion tag 1.000 -> 0.333                                          -> cohesion.pearson_cohesion / .ising_cohesion

On hover (revealed, not statically drawn — every string below is a JSON value, nothing invented):
  edge tooltip "A ↔ B · J = x.xxx (sign preserved | flipped from Pearson)" -> edges[*].pair, .ising_J, .flipped
  node tooltip "id — label (role)"                                        -> nodes[*].id, .label, .role
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diagram 8 — Ising Chain</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400&family=Inter:wght@400;500;600&display=swap');
  html, body { margin: 0; padding: 0; background: #fffff8; }
  svg { display: block; }
  #tip {
    position: fixed;
    display: none;
    pointer-events: none;
    background: #fffff8;
    border: 1px solid #cccccc;
    padding: 6px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #111111;
    white-space: nowrap;
    z-index: 10;
  }
  .hit { cursor: pointer; }
</style>
</head>
<body>
<div id="tip"></div>
<svg width="700" height="780" viewBox="0 0 700 780" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="700" height="780" fill="#fffff8"/>

  <!-- legend: cohesion, edge-width scale, line-style key, hover hint — one line each -->
  <text x="40" y="28" font-family="EB Garamond, serif" font-style="italic" font-size="13" fill="#555555">Pearson cohesion <tspan font-family="Inter, sans-serif" fill="#111111">1.000</tspan> &#8594; Ising cohesion <tspan font-family="Inter, sans-serif" fill="#111111">0.333</tspan></text>
  <text x="40" y="48" font-family="EB Garamond, serif" font-style="italic" font-size="13" fill="#555555">edge width = <tspan font-family="Inter, sans-serif" fill="#111111">|J| &#215; 10</tspan></text>
  <text x="40" y="68" font-family="EB Garamond, serif" font-style="italic" font-size="13" fill="#555555">solid = confirmed, <tspan fill="#B22222">dashed red</tspan> = sign flipped once confounding was removed</text>
  <text x="40" y="88" font-family="EB Garamond, serif" font-style="italic" font-size="12" fill="#999999">hover an edge or node for details</text>

  <!-- edges: visible (thickness is the primary signal); H=11883 hub at canvas center -->
  <g>
    <line x1="202.3" y1="304.0" x2="350.0" y2="330.0" stroke="#111111" stroke-width="14.46"/>
    <line x1="350.0" y1="330.0" x2="452.5" y2="152.5" stroke="#111111" stroke-width="9.79"/>
    <line x1="452.5" y1="152.5" x2="492.5" y2="576.8" stroke="#111111" stroke-width="7.17"/>
    <line x1="350.0" y1="330.0" x2="492.5" y2="576.8" stroke="#B22222" stroke-width="3.26" stroke-dasharray="8,5"/>
    <line x1="350.0" y1="330.0" x2="145.2" y2="473.4" stroke="#111111" stroke-width="6.09"/>
    <line x1="202.3" y1="304.0" x2="452.5" y2="152.5" stroke="#B22222" stroke-width="1.39" stroke-dasharray="8,5"/>
    <line x1="202.3" y1="304.0" x2="492.5" y2="576.8" stroke="#111111" stroke-width="3.69"/>
    <line x1="202.3" y1="304.0" x2="145.2" y2="473.4" stroke="#111111" stroke-width="3.39"/>
    <line x1="452.5" y1="152.5" x2="145.2" y2="473.4" stroke="#B22222" stroke-width="0.95" stroke-dasharray="8,5"/>
    <line x1="492.5" y1="576.8" x2="145.2" y2="473.4" stroke="#B22222" stroke-width="0.09" stroke-dasharray="8,5"/>
    <line x1="492.5" y1="576.8" x2="532.5" y2="716.8" stroke="#B22222" stroke-width="0.21" stroke-dasharray="8,5"/>
  </g>

  <!-- edges: invisible wide hit-areas carry the hover behavior so even the 0.09px edge is easy to reach -->
  <g>
    <line class="hit" x1="202.3" y1="304.0" x2="350.0" y2="330.0" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'13305 ↔ 11883 · J = 1.446 (sign preserved)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="350.0" y1="330.0" x2="452.5" y2="152.5" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'11883 ↔ 8567 · J = 0.979 (sign preserved)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="452.5" y1="152.5" x2="492.5" y2="576.8" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'8567 ↔ 15551 · J = 0.717 (sign preserved)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="350.0" y1="330.0" x2="492.5" y2="576.8" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'11883 ↔ 15551 · J = -0.326 (flipped from Pearson)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="350.0" y1="330.0" x2="145.2" y2="473.4" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'11883 ↔ 11182 · J = 0.609 (sign preserved)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="202.3" y1="304.0" x2="452.5" y2="152.5" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'13305 ↔ 8567 · J = -0.139 (flipped from Pearson)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="202.3" y1="304.0" x2="492.5" y2="576.8" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'13305 ↔ 15551 · J = 0.369 (sign preserved)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="202.3" y1="304.0" x2="145.2" y2="473.4" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'13305 ↔ 11182 · J = 0.339 (sign preserved)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="452.5" y1="152.5" x2="145.2" y2="473.4" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'8567 ↔ 11182 · J = -0.095 (flipped from Pearson)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="492.5" y1="576.8" x2="145.2" y2="473.4" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'15551 ↔ 11182 · J = -0.009 (flipped from Pearson)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <line class="hit" x1="492.5" y1="576.8" x2="532.5" y2="716.8" stroke="transparent" stroke-width="18"
      onmouseover="showTip(event,'15551 ↔ 5932 · J = -0.021 (flipped from Pearson)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
  </g>

  <!-- nodes: drawn last so they sit on top of every edge hit-area; 11883 is the hub, at the visual center -->
  <g>
    <circle class="hit" cx="350.0" cy="330.0" r="26" fill="#fffff8" stroke="#111111" stroke-width="2.5"
      onmouseover="showTip(event,'11883 — apologies / forgiveness (hub)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <text x="350.0" y="335.0" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#111111" style="pointer-events:none;">11883</text>

    <circle class="hit" cx="202.3" cy="304.0" r="20" fill="#fffff8" stroke="#111111" stroke-width="1.5"
      onmouseover="showTip(event,'13305 — remorse / forgiveness')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <text x="202.3" y="308.0" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#111111" style="pointer-events:none;">13305</text>

    <circle class="hit" cx="452.5" cy="152.5" r="20" fill="#fffff8" stroke="#111111" stroke-width="1.5"
      onmouseover="showTip(event,'8567 — regret / realization')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <text x="452.5" y="156.5" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#111111" style="pointer-events:none;">8567</text>

    <circle class="hit" cx="145.2" cy="473.4" r="16" fill="#fffff8" stroke="#111111" stroke-width="1.2"
      onmouseover="showTip(event,'11182 — legal / plea (peripheral)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <text x="145.2" y="477.4" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#111111" style="pointer-events:none;">11182</text>

    <circle class="hit" cx="492.5" cy="576.8" r="20" fill="#fffff8" stroke="#111111" stroke-width="1.5"
      onmouseover="showTip(event,'15551 — reflection / hindsight')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <text x="492.5" y="580.8" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#111111" style="pointer-events:none;">15551</text>

    <circle class="hit" cx="532.5" cy="716.8" r="16" fill="#fffff8" stroke="#111111" stroke-width="1.2"
      onmouseover="showTip(event,'5932 — transparency / honesty (peripheral)')" onmousemove="moveTip(event)" onmouseout="hideTip()"/>
    <text x="532.5" y="720.8" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#111111" style="pointer-events:none;">5932</text>
  </g>
</svg>
<script>
  function showTip(evt, text) {
    var tip = document.getElementById('tip');
    tip.textContent = text;
    tip.style.left = (evt.clientX + 14) + 'px';
    tip.style.top = (evt.clientY + 14) + 'px';
    tip.style.display = 'block';
  }
  function moveTip(evt) {
    var tip = document.getElementById('tip');
    if (tip.style.display === 'block') {
      tip.style.left = (evt.clientX + 14) + 'px';
      tip.style.top = (evt.clientY + 14) + 'px';
    }
  }
  function hideTip() {
    document.getElementById('tip').style.display = 'none';
  }
</script>
</body>
</html>

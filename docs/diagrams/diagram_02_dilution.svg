<?xml version="1.0" encoding="UTF-8"?>
<!--
DATA TRACE (diagram_02_dilution.svg) — single idea: equal-weight token averaging gives the one
emotion-carrying token (position 9, "tighten") the same weight as the other 10 tokens — 1/11 of
the resulting vector. Every value plotted below, from diagram_jsons/diagram_02_dilution.json:
  11 token cells, words   -> "sentence" (split per "tokenization_note": BOS, 9 words, final period)
  position numbers        -> array index 0-10, count = "token_count" (11)
  highlighted cell (9)    -> "emotion_token_position" (9), "emotion_token_text" ("tighten")
  bar split 1 vs 10 cells -> "dilution_fraction.signal_fraction" ("1/11"),
                             "dilution_fraction.structure_fraction" ("10/11")
-->
<svg width="800" height="170" viewBox="0 0 800 170" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600&amp;family=Inter:wght@400;500;600&amp;display=swap');
    .bg { fill: #fffff8; }
    .gar { font-family: 'EB Garamond', serif; fill: #111111; }
    .gar-muted-i { font-family: 'EB Garamond', serif; font-style: italic; fill: #555555; }
    .gar-accent { font-family: 'EB Garamond', serif; fill: #B22222; font-weight: 600; }
    .num-muted { font-family: 'Inter', sans-serif; font-size: 11px; fill: #555555; }
    .num-accent { font-family: 'Inter', sans-serif; font-size: 11px; fill: #B22222; font-weight: 600; }
    .num-frac { font-family: 'Inter', sans-serif; font-size: 12px; fill: #555555; font-weight: 500; }
    .num-frac-accent { font-family: 'Inter', sans-serif; font-size: 12px; fill: #B22222; font-weight: 600; }
  </style>
  <rect class="bg" x="0" y="0" width="800" height="170"/>

  <!-- token strip: 11 cells, width 64, centers at 80 + 64*i, i = 0..10 -->
  <g>
    <text class="gar" x="80" y="38" font-size="15" font-style="italic" fill="#555555" text-anchor="middle">BOS</text>
    <text class="gar" x="144" y="38" font-size="15" text-anchor="middle">She</text>
    <text class="gar" x="208" y="38" font-size="15" text-anchor="middle">opened</text>
    <text class="gar" x="272" y="38" font-size="15" text-anchor="middle">the</text>
    <text class="gar" x="336" y="38" font-size="15" text-anchor="middle">letter</text>
    <text class="gar" x="400" y="38" font-size="15" text-anchor="middle">and</text>
    <text class="gar" x="464" y="38" font-size="15" text-anchor="middle">felt</text>
    <text class="gar" x="528" y="38" font-size="15" text-anchor="middle">her</text>
    <text class="gar" x="592" y="38" font-size="15" text-anchor="middle">chest</text>
    <text class="gar-accent" x="656" y="39" font-size="16" text-anchor="middle">tighten</text>
    <text class="gar" x="720" y="38" font-size="15" text-anchor="middle">.</text>

    <text class="num-muted" x="80" y="56" text-anchor="middle">pos 0</text>
    <text class="num-muted" x="144" y="56" text-anchor="middle">pos 1</text>
    <text class="num-muted" x="208" y="56" text-anchor="middle">pos 2</text>
    <text class="num-muted" x="272" y="56" text-anchor="middle">pos 3</text>
    <text class="num-muted" x="336" y="56" text-anchor="middle">pos 4</text>
    <text class="num-muted" x="400" y="56" text-anchor="middle">pos 5</text>
    <text class="num-muted" x="464" y="56" text-anchor="middle">pos 6</text>
    <text class="num-muted" x="528" y="56" text-anchor="middle">pos 7</text>
    <text class="num-muted" x="592" y="56" text-anchor="middle">pos 8</text>
    <text class="num-accent" x="656" y="56" text-anchor="middle">pos 9</text>
    <text class="num-muted" x="720" y="56" text-anchor="middle">pos 10</text>
  </g>

  <!-- proportional bar: 1 cell (signal) vs 10 cells (structure), same 64px grid -->
  <g>
    <rect x="48" y="84" width="576" height="22" fill="#555555" opacity="0.22"/>
    <rect x="624" y="84" width="64" height="22" fill="#B22222"/>
    <rect x="688" y="84" width="64" height="22" fill="#555555" opacity="0.22"/>
    <g stroke="#cccccc" stroke-width="1">
      <line x1="112" y1="84" x2="112" y2="106"/>
      <line x1="176" y1="84" x2="176" y2="106"/>
      <line x1="240" y1="84" x2="240" y2="106"/>
      <line x1="304" y1="84" x2="304" y2="106"/>
      <line x1="368" y1="84" x2="368" y2="106"/>
      <line x1="432" y1="84" x2="432" y2="106"/>
      <line x1="496" y1="84" x2="496" y2="106"/>
      <line x1="560" y1="84" x2="560" y2="106"/>
      <line x1="624" y1="84" x2="624" y2="106"/>
      <line x1="688" y1="84" x2="688" y2="106"/>
    </g>
    <text class="num-frac" x="336" y="126" text-anchor="middle">10/11</text>
    <text class="num-frac-accent" x="656" y="126" text-anchor="middle">1/11</text>
  </g>
</svg>
